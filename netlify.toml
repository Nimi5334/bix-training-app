[build]
  command = "npm run build"
  functions = "functions"
  publish = "."

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["stripe", "firebase-admin"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[dev]
  framework = "#custom"
  command = "npm run dev"
  port = 8888

# Scheduled: run at-risk check daily at 9am UTC
[functions."at-risk-check"]
  schedule = "0 9 * * *"
